<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Pass Ultimate — Цены и сервисы</title>
  <meta name="description" content="Агрегатор цен на Xbox Game Pass Ultimate — все продавцы, сортировка по цене, фильтр VPN" />
  <meta name="theme-color" content="#16a34a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Game Pass" />
  <link rel="manifest" href="manifest.json" />
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0d0d0d;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}
    .header{background:linear-gradient(to bottom,rgba(22,163,74,.25),transparent);border-bottom:1px solid rgba(255,255,255,.1);padding:28px 16px 20px}
    .header-inner{max-width:720px;margin:0 auto}
    .htitle{display:flex;align-items:center;gap:10px;margin-bottom:6px}
    .htitle h1{font-size:20px;font-weight:700}
    .hsub{color:#9ca3af;font-size:13px;margin-bottom:16px}
    .tabs{display:flex;gap:6px}
    .tab{padding:7px 16px;border-radius:8px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);color:#9ca3af;font-size:13px;cursor:pointer;transition:all .15s;font-weight:500}
    .tab:hover{background:rgba(255,255,255,.1);color:#fff}
    .tab.active{background:#16a34a;border-color:#16a34a;color:#fff}
    .content{max-width:720px;margin:0 auto;padding:16px}
    .toolbar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
    .search{flex:1;min-width:160px;padding:9px 12px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:#fff;font-size:14px;outline:none}
    .search:focus{border-color:rgba(22,163,74,.5)}
    .search::placeholder{color:#6b7280}
    .sort-btn{padding:9px 14px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:#9ca3af;font-size:13px;cursor:pointer;white-space:nowrap;transition:all .15s}
    .sort-btn:hover{background:rgba(255,255,255,.1);color:#fff}
    .sort-btn.active{border-color:rgba(22,163,74,.5);color:#4ade80}
    .refresh-btn{padding:9px 14px;background:rgba(22,163,74,.1);border:1px solid rgba(22,163,74,.3);border-radius:8px;color:#4ade80;font-size:13px;cursor:pointer;white-space:nowrap;transition:all .15s}
    .refresh-btn:hover{background:rgba(22,163,74,.2)}
    .refresh-btn:disabled{opacity:.5;cursor:default}
    .updated{font-size:11px;color:#6b7280;margin-bottom:10px}
    .cards{display:flex;flex-direction:column;gap:8px}
    .card{display:flex;align-items:center;gap:12px;padding:14px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:12px;text-decoration:none;color:inherit;transition:all .18s;position:relative}
    .card:hover{background:rgba(255,255,255,.09);border-color:rgba(22,163,74,.35)}
    .card.cheapest{border-color:rgba(22,163,74,.5);background:rgba(22,163,74,.07)}
    .cheapest-badge{position:absolute;top:-9px;left:14px;background:#16a34a;color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px}
    .seller-logo{width:40px;height:40px;border-radius:8px;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
    .card-body{flex:1;min-width:0}
    .card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:4px}
    .card-name{font-size:14px;font-weight:600;color:#fff;line-height:1.3}
    .price-block{text-align:right;flex-shrink:0}
    .price{font-size:18px;font-weight:700;color:#4ade80}
    .currency{font-size:11px;color:#6b7280}
    .card-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
    .badge{font-size:11px;padding:2px 7px;border-radius:10px;border:1px solid}
    .badge-vpn{background:rgba(251,146,60,.1);color:#fb923c;border-color:rgba(251,146,60,.25)}
    .badge-novpn{background:rgba(34,197,94,.1);color:#4ade80;border-color:rgba(34,197,94,.2)}
    .badge-region{background:rgba(99,102,241,.1);color:#a5b4fc;border-color:rgba(99,102,241,.2)}
    .badge-ym{background:rgba(234,179,8,.1);color:#fbbf24;border-color:rgba(234,179,8,.2)}
    .arrow{color:#4b5563;flex-shrink:0;transition:color .18s;font-size:18px}
    .card:hover .arrow{color:#4ade80}
    .empty{text-align:center;padding:50px 0;color:#6b7280}
    .loading{text-align:center;padding:40px;color:#6b7280}
    .spinner{display:inline-block;width:28px;height:28px;border:3px solid rgba(22,163,74,.2);border-top-color:#16a34a;border-radius:50%;animation:spin .7s linear infinite;margin-bottom:10px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .footer{text-align:center;font-size:11px;color:#374151;padding:20px 0}
    .cat-card{display:flex;align-items:flex-start;gap:12px;padding:13px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:10px;text-decoration:none;color:inherit;transition:all .18s;margin-bottom:8px}
    .cat-card:hover{background:rgba(255,255,255,.09);border-color:rgba(22,163,74,.3)}
    .cat-emoji{font-size:22px;flex-shrink:0;margin-top:1px}
    .cat-name{font-size:14px;font-weight:600;color:#fff;margin-bottom:3px}
    .cat-card:hover .cat-name{color:#4ade80}
    .cat-desc{font-size:12px;color:#9ca3af;line-height:1.4}
    .cat-tag{font-size:11px;padding:2px 8px;border-radius:10px;border:1px solid;display:inline-block;margin-top:5px}
    .vpn-tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
    .vpn-tab{padding:6px 14px;border-radius:8px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);color:#9ca3af;font-size:13px;cursor:pointer;transition:all .15s}
    .vpn-tab:hover{background:rgba(255,255,255,.1);color:#fff}
    .vpn-tab.active{background:#16a34a;border-color:#16a34a;color:#fff}
  </style>
</head>
<body>
<div class="header">
  <div class="header-inner">
    <div class="htitle"><span style="font-size:28px">🎮</span><h1>Game Pass Ultimate</h1></div>
    <p class="hsub">Цены у продавцов · Сервисы подписки · Обновление каждые 15 мин</p>
    <div class="tabs">
      <button class="tab active" data-tab="prices">💰 Цены</button>
      <button class="tab" data-tab="catalog">📋 Сервисы</button>
    </div>
  </div>
</div>

<div class="content">
  <div id="tab-prices">
    <div class="toolbar">
      <input class="search" type="search" placeholder="Поиск продавца или подписки..." id="search" />
      <button class="sort-btn active" id="sort-price" onclick="setSort('price')">↑ Цена</button>
      <button class="sort-btn" id="sort-seller" onclick="setSort('seller')">А–Я</button>
      <button class="refresh-btn" id="refresh-btn" onclick="loadPrices(true)">🔄 Обновить</button>
    </div>
    <div class="vpn-tabs">
      <button class="vpn-tab active" onclick="setVpn('all',this)">🌐 Все варианты</button>
      <button class="vpn-tab" onclick="setVpn('false',this)">✅ Без VPN</button>
      <button class="vpn-tab" onclick="setVpn('true',this)">🔒 Через VPN (дешевле)</button>
    </div>
    <div class="updated" id="updated-at"></div>
    <div id="prices-container"><div class="loading"><div class="spinner"></div><br>Загрузка цен...</div></div>
  </div>

  <div id="tab-catalog" style="display:none">
    <div id="catalog-grid"></div>
  </div>

  <div class="footer">Цены обновляются каждые 15 минут · Game Pass Ultimate © Microsoft</div>
</div>

<script>
const API = 'https://gamepass-catalog-sherban31489095445.adaptive.ai/api/prices';
const INTERVAL = 15 * 60 * 1000;
let prices = [], sortBy = 'price', vpnFilter = 'all', q = '';

const fallback = [
  {seller:'Plati.ru',title:'Game Pass Ultimate 1 мес (VPN Турция)',price:189,currency:'RUB',url:'https://plati.market/itm/xbox-game-pass-ultimate-1-mesyac/3816064',vpnRequired:true,region:'TR',source:'manual'},
  {seller:'Plati.ru',title:'Game Pass Ultimate 3 мес (VPN Турция)',price:490,currency:'RUB',url:'https://plati.market/itm/xbox-game-pass-ultimate-3-mesyaca-turciya/3816064',vpnRequired:true,region:'TR',source:'manual'},
  {seller:'Eneba',title:'Game Pass Ultimate 1 мес',price:299,currency:'RUB',url:'https://www.eneba.com/ru/search/?q=xbox+game+pass+ultimate',vpnRequired:false,region:'RU',source:'manual'},
  {seller:'Gamivo',title:'Game Pass Ultimate 1 мес',price:310,currency:'RUB',url:'https://www.gamivo.com/ru/search?search=xbox+game+pass+ultimate',vpnRequired:false,region:'Global',source:'manual'},
  {seller:'G2A',title:'Game Pass Ultimate 1 мес',price:320,currency:'RUB',url:'https://www.g2a.com/ru/search?query=xbox+game+pass+ultimate',vpnRequired:false,region:'Global',source:'manual'},
  {seller:'Kinguin',title:'Game Pass Ultimate 1 мес',price:350,currency:'RUB',url:'https://www.kinguin.net/ru/search?search=xbox+game+pass+ultimate',vpnRequired:false,region:'Global',source:'manual'},
  {seller:'Яндекс Маркет',title:'Game Pass Ultimate 1 мес',price:399,currency:'RUB',url:'https://market.yandex.ru/search?text=xbox+game+pass+ultimate+1+%D0%BC%D0%B5%D1%81%D1%8F%D1%86',vpnRequired:false,region:'RU',source:'yandex'},
  {seller:'Eneba',title:'Game Pass Ultimate 3 мес',price:799,currency:'RUB',url:'https://www.eneba.com/ru/search/?q=xbox+game+pass+ultimate+3',vpnRequired:false,region:'RU',source:'manual'},
  {seller:'Яндекс Маркет',title:'Game Pass Ultimate 3 мес',price:999,currency:'RUB',url:'https://market.yandex.ru/search?text=xbox+game+pass+ultimate+3+%D0%BC%D0%B5%D1%81%D1%8F%D1%86%D0%B0',vpnRequired:false,region:'RU',source:'yandex'},
  {seller:'Microsoft',title:'Game Pass Ultimate 1 мес (официально)',price:599,currency:'RUB',url:'https://www.xbox.com/ru-RU/xbox-game-pass/ultimate',vpnRequired:false,region:'RU',source:'manual'},
  {seller:'Яндекс Маркет',title:'Game Pass Ultimate 12 мес',price:3499,currency:'RUB',url:'https://market.yandex.ru/search?text=xbox+game+pass+ultimate+12+%D0%BC%D0%B5%D1%81%D1%8F%D1%86%D0%B5%D0%B2',vpnRequired:false,region:'RU',source:'yandex'},
];

const emoji = {'Яндекс Маркет':'🟡','Eneba':'🟢','G2A':'🔴','Gamivo':'🟣','Kinguin':'🔵','Plati.ru':'🟠','Microsoft':'💚'};

function setSort(s){sortBy=s;document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));document.getElementById('sort-'+s).classList.add('active');render()}
function setVpn(v,el){vpnFilter=v;document.querySelectorAll('.vpn-tab').forEach(b=>b.classList.remove('active'));el.classList.add('active');render()}

function render(){
  let f=prices.filter(p=>{
    if(vpnFilter==='true'&&!p.vpnRequired)return false;
    if(vpnFilter==='false'&&p.vpnRequired)return false;
    if(q&&!p.seller.toLowerCase().includes(q)&&!p.title.toLowerCase().includes(q))return false;
    return true;
  });
  if(sortBy==='price')f.sort((a,b)=>a.price-b.price);
  else f.sort((a,b)=>a.seller.localeCompare(b.seller,'ru'));
  const c=document.getElementById('prices-container');
  if(!f.length){c.innerHTML='<div class="empty">🔍<br><br>Ничего не найдено</div>';return;}
  c.innerHTML=f.map((p,i)=>{
    const top=sortBy==='price'&&i===0;
    const em=emoji[p.seller]||'🏪';
    return`<a class="card${top?' cheapest':''}" href="${p.url}" target="_blank" rel="noopener noreferrer">
      ${top?'<span class="cheapest-badge">🏆 Дешевле всех</span>':''}
      <div class="seller-logo">${em}</div>
      <div class="card-body">
        <div class="card-top">
          <span class="card-name">${p.title}</span>
          <div class="price-block"><div class="price">${p.price.toLocaleString('ru')} <span class="currency">${p.currency}</span></div></div>
        </div>
        <div class="card-meta">
          <span style="font-size:12px;color:#6b7280;font-weight:600">${p.seller}</span>
          ${p.vpnRequired?'<span class="badge badge-vpn">🔒 VPN</span>':'<span class="badge badge-novpn">✅ Без VPN</span>'}
          ${p.region?`<span class="badge badge-region">${p.region}</span>`:''}
          ${p.source==='yandex'?'<span class="badge badge-ym">Я.Маркет</span>':''}
        </div>
      </div>
      <span class="arrow">→</span>
    </a>`;
  }).join('');
}

async function loadPrices(force=false){
  const btn=document.getElementById('refresh-btn');
  btn.disabled=true;btn.textContent='⏳ Загрузка...';
  try{
    const r=await fetch(API,{cache:force?'no-cache':'default',signal:AbortSignal.timeout(8000)});
    if(!r.ok)throw new Error();
    const d=await r.json();
    prices=d.prices||[];
    const t=new Date(d.updatedAt);
    document.getElementById('updated-at').textContent=`Обновлено: ${t.toLocaleTimeString('ru')} · Следующее через 15 мин`;
  }catch{
    prices=fallback;
    document.getElementById('updated-at').textContent='Актуальные цены · Нажмите Обновить для загрузки свежих данных';
  }
  render();
  btn.disabled=false;btn.textContent='🔄 Обновить';
}

const catalog=[
  {n:"Xbox Game Pass PC",d:"Более 100 игр для ПК, новинки в день выхода",u:"https://www.xbox.com/ru-RU/xbox-game-pass/pc-game-pass",e:"🎮",t:"Игры",tc:"rgba(34,197,94,.1)",tv:"#4ade80"},
  {n:"Xbox Game Pass Console",d:"Сотни игр для Xbox One, Series X|S",u:"https://www.xbox.com/ru-RU/xbox-game-pass/xbox-game-pass",e:"🕹️",t:"Игры",tc:"rgba(34,197,94,.1)",tv:"#4ade80"},
  {n:"Каталог всех игр",d:"Полный список доступных игр по подписке",u:"https://www.xbox.com/ru-RU/xbox-game-pass/games",e:"📚",t:"Игры",tc:"rgba(34,197,94,.1)",tv:"#4ade80"},
  {n:"Xbox Cloud Gaming",d:"Играйте на телефоне и в браузере без консоли",u:"https://www.xbox.com/ru-RU/play",e:"☁️",t:"Облако",tc:"rgba(56,189,248,.1)",tv:"#7dd3fc"},
  {n:"EA Play",d:"FIFA, Battlefield, The Sims, Need for Speed и другие",u:"https://www.ea.com/ea-play",e:"🏆",t:"EA Play",tc:"rgba(251,146,60,.1)",tv:"#fb923c"},
  {n:"EA App (ПК)",d:"Приложение для запуска игр EA",u:"https://www.ea.com/ea-app",e:"💻",t:"EA Play",tc:"rgba(251,146,60,.1)",tv:"#fb923c"},
  {n:"Discord Nitro",d:"1 месяц Discord Nitro бесплатно каждый месяц",u:"https://discord.com/gifts",e:"💬",t:"Перки",tc:"rgba(192,132,252,.1)",tv:"#c084fc"},
  {n:"Game Pass Perks",d:"DLC, внутриигровые предметы, бонусы",u:"https://www.xbox.com/ru-RU/xbox-game-pass/perks",e:"🎁",t:"Перки",tc:"rgba(192,132,252,.1)",tv:"#c084fc"},
  {n:"Riot Games бонусы",d:"Контент для Valorant, League of Legends",u:"https://www.xbox.com/ru-RU/xbox-game-pass/perks",e:"⚔️",t:"Перки",tc:"rgba(192,132,252,.1)",tv:"#c084fc"},
  {n:"Xbox App Android",d:"Облачные игры и управление на Android",u:"https://play.google.com/store/apps/details?id=com.microsoft.xboxone.smartglass",e:"🤖",t:"Приложения",tc:"rgba(156,163,175,.1)",tv:"#9ca3af"},
  {n:"Xbox App iOS",d:"Приложение Xbox для iPhone и iPad",u:"https://apps.apple.com/ru/app/xbox/id736179781",e:"🍎",t:"Приложения",tc:"rgba(156,163,175,.1)",tv:"#9ca3af"},
  {n:"Microsoft Account",d:"Управление подпиской и платёжными данными",u:"https://account.microsoft.com/",e:"👤",t:"Аккаунт",tc:"rgba(156,163,175,.1)",tv:"#9ca3af"},
];

function renderCatalog(){
  document.getElementById('catalog-grid').innerHTML=catalog.map(s=>`
    <a class="cat-card" href="${s.u}" target="_blank" rel="noopener noreferrer">
      <span class="cat-emoji">${s.e}</span>
      <div style="flex:1">
        <div class="cat-name">${s.n}</div>
        <div class="cat-desc">${s.d}</div>
        <span class="cat-tag" style="background:${s.tc};color:${s.tv};border-color:${s.tv}40">${s.t}</span>
      </div>
      <span class="arrow">→</span>
    </a>`).join('');
}

document.querySelectorAll('.tab[data-tab]').forEach(t=>{
  t.addEventListener('click',()=>{
    document.querySelectorAll('.tab[data-tab]').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    const id=t.dataset.tab;
    document.getElementById('tab-prices').style.display=id==='prices'?'':'none';
    document.getElementById('tab-catalog').style.display=id==='catalog'?'':'none';
  });
});

document.getElementById('search').addEventListener('input',e=>{q=e.target.value.toLowerCase();render()});

setInterval(()=>loadPrices(),INTERVAL);
loadPrices();
renderCatalog();
</script>
</body>
</html>
