<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Pass Ultimate — Каталог сервисов</title>
  <meta name="description" content="Все сервисы, игры и перки по подписке Xbox Game Pass Ultimate с прямыми ссылками" />
  <meta name="theme-color" content="#16a34a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Game Pass" />
  <link rel="manifest" href="manifest.json" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d0d0d; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }
    .header { background: linear-gradient(to bottom, rgba(22,163,74,0.2), transparent); border-bottom: 1px solid rgba(255,255,255,0.1); padding: 32px 16px 24px; }
    .header-inner { max-width: 700px; margin: 0 auto; }
    .header-title { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
    .header-title h1 { font-size: 22px; font-weight: 700; }
    .header p { color: #9ca3af; font-size: 14px; margin-bottom: 20px; }
    .search { width: 100%; padding: 10px 14px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-size: 15px; outline: none; }
    .search:focus { border-color: rgba(22,163,74,0.5); }
    .search::placeholder { color: #6b7280; }
    .content { max-width: 700px; margin: 0 auto; padding: 20px 16px; }
    .filters { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
    .filter-btn { padding: 6px 14px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: #d1d5db; font-size: 13px; cursor: pointer; transition: all 0.15s; }
    .filter-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .filter-btn.active { background: #16a34a; border-color: #16a34a; color: #fff; }
    .cards { display: flex; flex-direction: column; gap: 10px; }
    .card { display: flex; align-items: flex-start; gap: 12px; padding: 14px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; text-decoration: none; color: inherit; transition: all 0.2s; }
    .card:hover { background: rgba(255,255,255,0.09); border-color: rgba(22,163,74,0.4); }
    .card-emoji { font-size: 24px; flex-shrink: 0; margin-top: 2px; }
    .card-body { flex: 1; min-width: 0; }
    .card-title { display: flex; align-items: center; flex-wrap: wrap; gap: 6px; margin-bottom: 4px; }
    .card-name { font-size: 14px; font-weight: 600; color: #fff; }
    .card:hover .card-name { color: #4ade80; }
    .badge { font-size: 11px; padding: 2px 7px; border-radius: 20px; background: rgba(22,163,74,0.2); color: #4ade80; border: 1px solid rgba(22,163,74,0.3); }
    .card-desc { font-size: 12px; color: #9ca3af; line-height: 1.5; margin-bottom: 6px; }
    .cat-badge { font-size: 11px; padding: 2px 8px; border-radius: 20px; border: 1px solid; display: inline-block; }
    .cat-Игры { background: rgba(34,197,94,0.1); color: #4ade80; border-color: rgba(34,197,94,0.2); }
    .cat-Облачные { background: rgba(56,189,248,0.1); color: #7dd3fc; border-color: rgba(56,189,248,0.2); }
    .cat-EA { background: rgba(251,146,60,0.1); color: #fb923c; border-color: rgba(251,146,60,0.2); }
    .cat-Перки { background: rgba(192,132,252,0.1); color: #c084fc; border-color: rgba(192,132,252,0.2); }
    .cat-Стриминг { background: rgba(244,114,182,0.1); color: #f472b6; border-color: rgba(244,114,182,0.2); }
    .cat-Другое { background: rgba(156,163,175,0.1); color: #9ca3af; border-color: rgba(156,163,175,0.2); }
    .arrow { color: #4b5563; font-size: 18px; flex-shrink: 0; margin-top: 4px; transition: color 0.2s; }
    .card:hover .arrow { color: #4ade80; }
    .empty { text-align: center; padding: 60px 0; color: #6b7280; }
    .empty span { font-size: 40px; display: block; margin-bottom: 12px; }
    .footer { text-align: center; font-size: 11px; color: #374151; padding: 24px 0; }
    .count { font-size: 12px; color: #6b7280; margin-bottom: 14px; }
  </style>
</head>
<body>
<div class="header">
  <div class="header-inner">
    <div class="header-title"><span style="font-size:32px">🎮</span><h1>Game Pass Ultimate</h1></div>
    <p>Все сервисы, игры и перки по подписке — с прямыми ссылками</p>
    <input class="search" type="search" placeholder="Поиск сервиса..." id="search" />
  </div>
</div>
<div class="content">
  <div class="filters" id="filters"></div>
  <div class="count" id="count"></div>
  <div class="cards" id="cards"></div>
  <div class="footer">Данные актуальны на март 2026 · Game Pass Ultimate © Microsoft</div>
</div>
<script>
const services = [
  {name:"Xbox Game Pass PC",desc:"Более 100 игр для ПК, включая новинки в день выхода",url:"https://www.xbox.com/ru-RU/xbox-game-pass/pc-game-pass",cat:"Игры",emoji:"🎮",badge:"Включено"},
  {name:"Xbox Game Pass Console",desc:"Сотни игр для Xbox One, Series X|S",url:"https://www.xbox.com/ru-RU/xbox-game-pass/xbox-game-pass",cat:"Игры",emoji:"🕹️",badge:"Включено"},
  {name:"Xbox Game Pass — Каталог игр",desc:"Полный список всех доступных игр по подписке",url:"https://www.xbox.com/ru-RU/xbox-game-pass/games",cat:"Игры",emoji:"📚"},
  {name:"Xbox Cloud Gaming (xCloud)",desc:"Играйте на телефоне, планшете и браузере без консоли",url:"https://www.xbox.com/ru-RU/play",cat:"Облачные",emoji:"☁️",badge:"Ultimate"},
  {name:"Xbox Cloud Gaming — браузер",desc:"Запускайте игры прямо в браузере без загрузки",url:"https://www.xbox.com/ru-RU/play",cat:"Облачные",emoji:"🌐"},
  {name:"EA Play",desc:"Игры EA: FIFA, Battlefield, The Sims, Need for Speed и др.",url:"https://www.ea.com/ea-play",cat:"EA",emoji:"🏆",badge:"Включено"},
  {name:"EA App",desc:"Приложение для запуска игр EA на ПК",url:"https://www.ea.com/ea-app",cat:"EA",emoji:"💻"},
  {name:"EA Play — каталог игр",desc:"Все игры EA, доступные по подписке",url:"https://www.ea.com/ea-play/games",cat:"EA",emoji:"🎯"},
  {name:"Discord Nitro (1 месяц)",desc:"Бесплатный месяц Discord Nitro каждый месяц",url:"https://discord.com/gifts",cat:"Перки",emoji:"💬",badge:"Ежемесячно"},
  {name:"Spotify Premium (3 месяца)",desc:"Пробный период Spotify Premium для новых пользователей",url:"https://www.spotify.com",cat:"Перки",emoji:"🎵",badge:"Новым"},
  {name:"Xbox Game Pass Perks",desc:"Все текущие перки: DLC, внутриигровые предметы, бонусы",url:"https://www.xbox.com/ru-RU/xbox-game-pass/perks",cat:"Перки",emoji:"🎁",badge:"Обновляются"},
  {name:"Riot Games — бонусы",desc:"Бонусный контент для Valorant, League of Legends и других игр Riot",url:"https://www.xbox.com/ru-RU/xbox-game-pass/perks",cat:"Перки",emoji:"⚔️"},
  {name:"Warframe — перки",desc:"Внутриигровые предметы и валюта для Warframe",url:"https://www.xbox.com/ru-RU/xbox-game-pass/perks",cat:"Перки",emoji:"🚀"},
  {name:"Starz (США, 30 дней)",desc:"Пробный доступ к стриминговому сервису Starz",url:"https://www.starz.com",cat:"Стриминг",emoji:"⭐",badge:"США"},
  {name:"Xbox App (Windows)",desc:"Официальное приложение Xbox для Windows 10/11",url:"https://www.xbox.com/ru-RU/apps/xbox-app-for-windows-10",cat:"Другое",emoji:"🪟"},
  {name:"Xbox App (Android)",desc:"Приложение Xbox для Android — облачные игры и управление",url:"https://play.google.com/store/apps/details?id=com.microsoft.xboxone.smartglass",cat:"Другое",emoji:"🤖"},
  {name:"Xbox App (iOS)",desc:"Приложение Xbox для iPhone и iPad",url:"https://apps.apple.com/ru/app/xbox/id736179781",cat:"Другое",emoji:"🍎"},
  {name:"Microsoft Account",desc:"Управление аккаунтом, подпиской и платёжными данными",url:"https://account.microsoft.com/",cat:"Другое",emoji:"👤"},
  {name:"Купить Game Pass Ultimate",desc:"Оформить или продлить подписку Game Pass Ultimate",url:"https://www.xbox.com/ru-RU/xbox-game-pass/ultimate",cat:"Другое",emoji:"💳",badge:"Купить"},
];

const categories = ["Все","Игры","Облачные","EA","Перки","Стриминг","Другое"];
let activeCategory = "Все";
let searchText = "";

function catClass(cat) { return "cat-" + cat.split(" ")[0]; }

function render() {
  const filtered = services.filter(s => {
    const matchCat = activeCategory === "Все" || s.cat === activeCategory;
    const matchSearch = !searchText || s.name.toLowerCase().includes(searchText) || s.desc.toLowerCase().includes(searchText);
    return matchCat && matchSearch;
  });
  document.getElementById("count").textContent = searchText ? `Найдено: ${filtered.length} из ${services.length}` : "";
  const cards = document.getElementById("cards");
  if (!filtered.length) {
    cards.innerHTML = `<div class="empty"><span>🔍</span>Ничего не найдено по запросу «${searchText}»</div>`;
    return;
  }
  cards.innerHTML = filtered.map(s => `
    <a class="card" href="${s.url}" target="_blank" rel="noopener noreferrer">
      <span class="card-emoji">${s.emoji}</span>
      <div class="card-body">
        <div class="card-title">
          <span class="card-name">${s.name}</span>
          ${s.badge ? `<span class="badge">${s.badge}</span>` : ""}
        </div>
        <div class="card-desc">${s.desc}</div>
        <span class="cat-badge ${catClass(s.cat)}">${s.cat === "Облачные" ? "Облачные игры" : s.cat === "EA" ? "EA Play" : s.cat}</span>
      </div>
      <span class="arrow">→</span>
    </a>
  `).join("");
}

function renderFilters() {
  document.getElementById("filters").innerHTML = categories.map(cat => {
    const count = cat === "Все" ? services.length : services.filter(s => s.cat === cat).length;
    return `<button class="filter-btn ${cat === activeCategory ? "active" : ""}" data-cat="${cat}">${cat === "Облачные" ? "Облачные игры" : cat === "EA" ? "EA Play" : cat} <span style="opacity:0.6">${count}</span></button>`;
  }).join("");
  document.querySelectorAll(".filter-btn").forEach(btn => {
    btn.addEventListener("click", () => { activeCategory = btn.dataset.cat; renderFilters(); render(); });
  });
}

document.getElementById("search").addEventListener("input", e => { searchText = e.target.value.toLowerCase(); render(); });
renderFilters();
render();
</script>
</body>
</html>
